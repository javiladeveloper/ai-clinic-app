name: Android · Play Store

# Se dispara a mano (workflow_dispatch) o al empujar un tag android-vX.Y.Z.
# NO corre en cada push a master (para no gastar builds ni subir sin querer).
on:
  workflow_dispatch:
    inputs:
      track:
        description: "Canal de Play Store"
        required: true
        default: "internal"
        type: choice
        options: [internal, production]
  push:
    tags:
      - "android-v*"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      # Reconstruye el keystore de firma desde secrets (nunca vive en el repo).
      # KEYSTORE_BASE64 = el .jks codificado en base64.
      - name: Restaurar keystore de firma
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > sania-release.jks
          cat > keystore.properties <<EOF
          storeFile=sania-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Compilar AAB de release (firmado)
        run: |
          chmod +x ./gradlew
          ./gradlew :composeApp:bundleRelease

      # Ruby + Bundler con caché. Instala Fastlane vía Gemfile sin problemas de
      # permisos (a diferencia de 'gem install' global, que falla en el runner).
      - name: Instalar Fastlane (Ruby + bundler)
        # Pineado a SHA (seguridad): ruby/setup-ruby v1.207.0
        uses: ruby/setup-ruby@354a1ad156761f5ee2b7b13fa8e09943a5e8d252
        with:
          ruby-version: "3.2"
          bundler-cache: true

      # La cuenta de servicio de Google Play. Se pasa en BASE64 para que la private_key
      # (con sus \n) no se corrompa al guardarla como secret — la corrupción causa
      # "Invalid JWT Signature". El secret PLAY_STORE_JSON_KEY_B64 = base64 del .json.
      - name: Restaurar clave de Google Play
        env:
          PLAY_JSON_B64: ${{ secrets.PLAY_STORE_JSON_KEY_B64 }}
        run: echo "$PLAY_JSON_B64" | base64 -d > play-store-key.json

      - name: Subir a Play Store
        env:
          PLAY_STORE_JSON_KEY_PATH: play-store-key.json
        run: bundle exec fastlane android ${{ github.event.inputs.track || 'internal' }}

      # Actualiza en Vercel la ÚLTIMA versión disponible (APP_ANDROID_LATEST) al versionCode
      # recién subido → el endpoint /api/app/version la sirve y la app muestra el popup
      # "nueva versión disponible" sin que nadie toque Vercel a mano.
      # Requiere secrets: VERCEL_TOKEN y VERCEL_PROJECT_ID (ver docs/ci-cd-despliegue.md).
      # Se salta silenciosamente si los secrets no están configurados (no rompe el deploy).
      - name: Actualizar versión en Vercel (popup de actualización)
        if: ${{ github.event.inputs.track != 'production' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "VERCEL_TOKEN/VERCEL_PROJECT_ID no configurados — se omite (config manual)."
            exit 0
          fi
          # versionCode del build.gradle.kts (la línea 'versionCode = N').
          VC=$(grep -oE 'versionCode[[:space:]]*=[[:space:]]*[0-9]+' composeApp/build.gradle.kts | grep -oE '[0-9]+' | head -1)
          echo "Actualizando APP_ANDROID_LATEST = $VC en Vercel…"
          # 1) Buscar el id de la env var existente (si existe) para actualizarla.
          ENV_ID=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env" \
            | grep -o '"id":"[^"]*","key":"APP_ANDROID_LATEST"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -n "$ENV_ID" ]; then
            curl -s -X PATCH -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ENV_ID" \
              -d "{\"value\":\"$VC\"}" > /dev/null && echo "✓ actualizada."
          else
            curl -s -X POST -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
              "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env" \
              -d "{\"key\":\"APP_ANDROID_LATEST\",\"value\":\"$VC\",\"type\":\"plain\",\"target\":[\"production\"]}" > /dev/null && echo "✓ creada."
          fi
          # Vercel CONGELA las env vars al momento del deploy: cambiar la var NO afecta al
          # deployment vivo hasta un nuevo deploy. El Deploy Hook re-despliega producción
          # con el valor fresco → el endpoint /api/app/version pasa a servir el nuevo número.
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK" > /dev/null && echo "✓ redeploy de la web disparado (deploy hook)."
          else
            echo "⚠ VERCEL_DEPLOY_HOOK no configurado — la var quedó guardada pero el popup NO se activa hasta el próximo deploy de la web. Configúralo (ver docs/ci-cd-despliegue.md)."
          fi

      # Limpieza: borra los secretos materializados aunque el job falle.
      - name: Limpiar secretos del runner
        if: always()
        run: rm -f sania-release.jks keystore.properties play-store-key.json
