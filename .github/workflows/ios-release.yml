name: iOS · TestFlight

# Se dispara a mano o al empujar un tag ios-vX.Y.Z. Corre en macOS (Xcode requiere Mac).
on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"
    # ⏳ TEMPORAL (verificación del fix de codesign, jul-2026): dispara el CI al empujar
    # a la branch de trabajo, para poder validar el build sin crear un tag ni tener que
    # seleccionar la branch desde el móvil. QUITAR estas dos líneas cuando el fix esté
    # confirmado en verde.
    branches:
      - "claude/hola-hxmjl1"

jobs:
  build-and-upload:
    # Runner estándar gratis (repos públicos). Alcanza de sobra: otra app KMP (FitCore)
    # compila aquí sin problemas. El cuelgue de Sania NO era el runner, era el linker de
    # Xcode 26 (ld-prime) enlazando GoogleSignIn-iOS + su árbol Firebase/AppAuth/AppCheck
    # (que FitCore no tiene). Con Xcode 16 (linker clásico) el link termina normal.
    runs-on: macos-15
    # Tope de seguridad. El linker CLÁSICO de Xcode 16.2 compila de verdad (no se cuelga
    # como el ld-prime de Xcode 26), pero es LENTO con todo el árbol KMP + Firebase +
    # GoogleSignIn: la compilación real toma ~40 min. 45 min lo cortaba justo antes de
    # terminar el link. 90 da margen de sobra y sigue matando cualquier cuelgue real.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Caché de Kotlin/Native (~/.konan: toolchain ~1GB + deps nativas) y de Gradle.
      # Sin esto cada corrida descargaba el toolchain completo y recompilaba TODAS las
      # dependencias desde cero (~10-20 min extra). La clave rota cuando cambian las
      # versiones (libs.versions.toml / *.gradle.kts); restore-keys reusa el caché
      # anterior como base aunque la clave exacta no coincida.
      - name: Caché Gradle + Kotlin/Native
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ios-konan-gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ios-konan-gradle-${{ runner.os }}-

      # Xcode 16.2: su linker clásico (ld64) enlaza GoogleSignIn-iOS + KMP sin colgarse,
      # a diferencia del ld-prime de Xcode 26 (que dejaba el build pegado horas en
      # "Linking Sania"). Es el mismo Xcode con el que FitCore compila bien.
      # OJO: si Apple rebota el upload exigiendo el SDK de iOS 26 ("built with iOS 18 SDK"),
      # subir a 26.x — pero entonces hay que resolver el linker de otra forma (runner
      # xlarge, o mover Google login a OAuth web para aligerar el link).
      - name: Seleccionar Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      # Xcode 16.2 en el runner viene SIN la plataforma iOS 18.2 descargada, así que
      # xcodebuild no encuentra ningún destino de dispositivo ("iOS 18.2 is not installed").
      # Esto la descarga e instala (unos minutos la primera vez). Es lo que faltaba: con
      # esto el destination generic/platform=iOS ya tiene un SDK real contra el cual archivar.
      - name: Instalar plataforma iOS (SDK del simulador/dispositivo)
        run: xcodebuild -downloadPlatform iOS -quiet || xcodebuild -downloadPlatform iOS

      - name: Instalar Fastlane (Ruby + bundler)
        # Pineado a SHA (seguridad): ruby/setup-ruby v1.207.0
        uses: ruby/setup-ruby@354a1ad156761f5ee2b7b13fa8e09943a5e8d252
        with:
          ruby-version: "3.2"
          bundler-cache: true

      # Firma: instala el certificado de distribución + perfil desde secrets.
      # Alternativa recomendada a futuro: fastlane match (repo privado de certificados).
      #
      # ⚠️ POR QUÉ ESTE PASO ES CRÍTICO (lección aprendida — build 2.6.x):
      # El build COMPILABA y ENLAZABA bien en ~20 min; lo que colgaba era `codesign`.
      # Se quedaba pegado 64 min hasta el timeout (proceso codesign huérfano en el
      # cleanup). Causa: el keychain temporal SE AUTO-BLOQUEA (default ~5 min) mientras
      # corre el "Compile Kotlin Framework" (~19 min). Cuando codesign firma el .app
      # DESPUÉS, el keychain está bloqueado y codesign espera un desbloqueo interactivo
      # que en un runner headless NUNCA llega → cuelga. NO era el linker (perdimos varios
      # intentos culpando a Xcode 26/ld-prime/ld_classic: falsos culpables).
      # Fix: (1) `set-keychain-settings -lut 21600` desactiva el auto-lock (6h > timeout),
      # (2) meter el keychain en la LISTA DE BÚSQUEDA (no solo default), (3) partition-list
      # con la MISMA contraseña no vacía para que codesign no muestre prompt.
      - name: Instalar certificado y perfil de firma
        env:
          DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}       # .p12 en base64
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          # Keychain temporal para el certificado. Contraseña NO vacía: con "" el
          # set-key-partition-list a veces falla en silencio y codesign termina pidiendo prompt.
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="ci-sania-$GITHUB_RUN_ID"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          # 🔑 Desactiva el auto-lock por tiempo (-t 21600 = 6h) y por sleep. Sin esto el
          # keychain se re-bloquea durante el compile de Kotlin y codesign cuelga después.
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"

          echo "$DIST_CERT_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security

          # El keychain debe estar en la LISTA DE BÚSQUEDA (no basta default-keychain),
          # o codesign no encuentra la identidad y/o cuelga. Preserva el login keychain.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN"

          # Permite a codesign usar la clave privada sin prompt interactivo.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"

          # Diagnóstico: confirma que la identidad de firma quedó disponible.
          security find-identity -v -p codesigning "$KEYCHAIN"

          # Perfil de aprovisionamiento.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/sania.mobileprovision

      - name: Compilar y subir a TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}   # .p8 en base64
        run: bundle exec fastlane ios beta

      - name: Limpiar secretos del runner
        if: always()
        run: rm -f cert.p12
