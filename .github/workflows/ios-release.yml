name: iOS · TestFlight

# Se dispara a mano o al empujar un tag ios-vX.Y.Z. Corre en macOS (Xcode requiere Mac).
on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"

jobs:
  build-and-upload:
    # Runner estándar gratis (repos públicos). El runner nunca fue el problema: los
    # cuelgues eran el keychain auto-bloqueado (ver paso de firma) y los rechazos de
    # Apple eran por el SDK viejo (ver paso de Xcode).
    runs-on: macos-15
    # Tope de seguridad del JOB. La compilación real con Xcode 26 toma ~20 min
    # (probado en ios-v2.9.3: compile Kotlin + link OK). 90 mata cualquier cuelgue real.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Caché de Kotlin/Native (~/.konan: toolchain ~1GB + deps nativas) y de Gradle.
      # Sin esto cada corrida descargaba el toolchain completo y recompilaba TODAS las
      # dependencias desde cero (~40 min extra).
      #
      # OJO 1: la clave depende SOLO de las DEPENDENCIAS (libs.versions.toml + wrapper), NO
      # de los *.gradle.kts. Antes incluía **/*.gradle.kts, y como el versionCode/versionName
      # vive en build.gradle.kts, CADA release cambiaba la clave → el caché nunca se reusaba.
      #
      # OJO 2 (lo importante): se usa RESTORE aquí + SAVE con `if: always()` AL FINAL del job.
      # Con el `actions/cache` normal, el guardado solo ocurre si el job TERMINA BIEN — y como
      # todas las corridas fallaban/se cancelaban antes, el caché NUNCA se guardaba (Post Cache
      # salía "skipped") → siempre se recompilaba desde cero. Con save `if: always()`, el caché
      # se guarda aunque el build falle, rompiendo el círculo vicioso.
      - name: Restaurar caché Gradle + Kotlin/Native
        id: cache-gradle
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.konan
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ios-konan-gradle-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ios-konan-gradle-${{ runner.os }}-

      # Caché del DerivedData de Xcode: aquí vive lo COMPILADO del framework KMP + libs. Es lo
      # que de verdad tarda. Con él (una vez guardado), la 2da corrida reusa los .o y baja
      # el build a ~5-10 min. Mismo esquema restore + save always.
      - name: Restaurar caché DerivedData de Xcode
        id: cache-derived
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ios-deriveddata-xc26-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'iosApp/iosApp.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ios-deriveddata-xc26-${{ runner.os }}-

      # Xcode 26 es OBLIGATORIO: desde abril 2026 Apple RECHAZA todo upload compilado con
      # un SDK menor a iOS 26 ("SDK version issue... must be built with the iOS 26 SDK",
      # visto en ios-v2.9.5). Xcode 16.2 compila y firma bien pero el .ipa REBOTA SIEMPRE
      # en App Store Connect → callejón sin salida. Los cuelgues que se le achacaban al
      # linker de Xcode 26 (ld-prime) eran en realidad el keychain auto-bloqueado (ya
      # corregido en el paso de firma): en ios-v2.9.3, con Xcode 26.3, el framework KMP
      # compiló y la app enlazó bien en ~20 min.
      - name: Seleccionar Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      # Xcode 26.3 en el runner ya trae la plataforma iOS (probado en ios-v2.9.3). El
      # download queda solo como red de seguridad si el SDK iphoneos faltara.
      - name: Verificar SDK iphoneos (descarga solo si falta)
        run: |
          if ! xcodebuild -showsdks | grep -qi "iphoneos"; then
            for i in 1 2 3; do
              xcodebuild -downloadPlatform iOS && break || echo "Reintento $i…"
              sleep 20
            done
          fi
          xcodebuild -showsdks | grep -qi "iphoneos" && echo "✓ SDK iphoneos OK" || { echo "✗ sin SDK iphoneos"; exit 1; }

      - name: Instalar Fastlane (Ruby + bundler)
        # Pineado a SHA (seguridad): ruby/setup-ruby v1.207.0
        uses: ruby/setup-ruby@354a1ad156761f5ee2b7b13fa8e09943a5e8d252
        with:
          ruby-version: "3.2"
          bundler-cache: true

      # Firma: instala el certificado de distribución + perfil desde secrets.
      # Alternativa recomendada a futuro: fastlane match (repo privado de certificados).
      #
      # ⚠️ POR QUÉ ESTE PASO ES CRÍTICO (lección aprendida — build 2.6.x):
      # El build COMPILABA y ENLAZABA bien en ~20 min; lo que colgaba era `codesign`.
      # Se quedaba pegado 64 min hasta el timeout (proceso codesign huérfano en el
      # cleanup). Causa: el keychain temporal SE AUTO-BLOQUEA (default ~5 min) mientras
      # corre el "Compile Kotlin Framework" (~19 min). Cuando codesign firma el .app
      # DESPUÉS, el keychain está bloqueado y codesign espera un desbloqueo interactivo
      # que en un runner headless NUNCA llega → cuelga. NO era el linker (perdimos varios
      # intentos culpando a Xcode 26/ld-prime/ld_classic: falsos culpables).
      # Fix: (1) `set-keychain-settings -lut 21600` desactiva el auto-lock (6h > timeout),
      # (2) meter el keychain en la LISTA DE BÚSQUEDA (no solo default), (3) partition-list
      # con la MISMA contraseña no vacía para que codesign no muestre prompt.
      - name: Instalar certificado y perfil de firma
        env:
          DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}       # .p12 en base64
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          # Keychain temporal para el certificado. Contraseña NO vacía: con "" el
          # set-key-partition-list a veces falla en silencio y codesign termina pidiendo prompt.
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="ci-sania-$GITHUB_RUN_ID"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          # 🔑 Desactiva el auto-lock por tiempo (-t 21600 = 6h) y por sleep. Sin esto el
          # keychain se re-bloquea durante el compile de Kotlin y codesign cuelga después.
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"

          echo "$DIST_CERT_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security

          # El keychain debe estar en la LISTA DE BÚSQUEDA (no basta default-keychain),
          # o codesign no encuentra la identidad y/o cuelga. Preserva el login keychain.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN"

          # Permite a codesign usar la clave privada sin prompt interactivo.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"

          # Diagnóstico: confirma que la identidad de firma quedó disponible.
          security find-identity -v -p codesigning "$KEYCHAIN"

          # Perfil de aprovisionamiento.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/sania.mobileprovision

      # Timeout POR PASO (no solo por job): si la compilación se arrastra, este paso muere
      # a los 55 min pero el JOB SIGUE VIVO → los pasos "Guardar caché" corren normal y el
      # progreso queda banqueado para la siguiente corrida (efecto trinquete: cada corrida
      # llega más lejos). Con el timeout solo a nivel job, el corte cancelaba todo.
      - name: Compilar y subir a TestFlight
        timeout-minutes: 55
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}   # .p8 (base64 o crudo, se auto-detecta en el Fastfile)
        run: bundle exec fastlane ios beta

      # Guardar el caché SIEMPRE (aunque el build falle). Esto es lo que rompe el círculo
      # vicioso: antes el caché solo se guardaba si el job terminaba bien, y como fallaba
      # siempre, nunca se guardaba y cada corrida recompilaba desde cero. Con `if: always()`
      # el trabajo de compilación queda cacheado y la SIGUIENTE corrida es rápida.
      # `hashFiles` en la key: se re-evalúa igual que en el restore (misma clave).
      - name: Guardar caché Gradle + Kotlin/Native
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.konan
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ios-konan-gradle-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Guardar caché DerivedData de Xcode
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ios-deriveddata-xc26-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'iosApp/iosApp.xcodeproj/project.pbxproj') }}

      - name: Limpiar secretos del runner
        if: always()
        run: rm -f cert.p12
