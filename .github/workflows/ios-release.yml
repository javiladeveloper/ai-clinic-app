name: iOS · TestFlight

# Se dispara a mano o al empujar un tag ios-vX.Y.Z. Corre en macOS (Xcode requiere Mac).
on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"

jobs:
  build-and-upload:
    runs-on: macos-14   # incluye Xcode reciente
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Seleccionar Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: Instalar Fastlane
        run: gem install fastlane --no-document

      # Firma: instala el certificado de distribución + perfil desde secrets.
      # Alternativa recomendada a futuro: fastlane match (repo privado de certificados).
      - name: Instalar certificado y perfil de firma
        env:
          DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}       # .p12 en base64
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          # Keychain temporal para el certificado.
          KEYCHAIN=build.keychain
          security create-keychain -p "" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          echo "$DIST_CERT_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN"
          # Perfil de aprovisionamiento.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/sania.mobileprovision

      - name: Compilar y subir a TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}   # .p8 en base64
        run: fastlane ios beta

      - name: Limpiar secretos del runner
        if: always()
        run: rm -f cert.p12
